<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);

   padding: 0;
   display: none;
}
header {
   background-color: #f1e31ce1;
   color: #fff;

}

.brand-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    font-size: 2rem;
    line-height: 1.1;
    font-weight: 600;

.brand-text {
    color: #ffffff !important;
    text-shadow: none;
}

.brand-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
}
nav ul {
   list-style-type: none;
   padding: 0;
   margin: 0;
   display: flex;
   flex-wrap: nowrap;
   justify-content: center;
   align-items: stretch;
   gap: 8px;
}
nav ul li {
   display: flex;
   align-items: stretch;
   flex: 0 0 112px;
   height: 44px;
}
nav ul li a {
   text-decoration: none;
   color: #111;
   font-weight: 400;
   display: block;
   text-align: center;
   height: 100%;
   line-height: 44px;
   padding: 0;
   box-sizing: border-box;
   width: 100%;

   position: relative;
   top: 0;
   transform: none;
   transition: none;

}

nav ul li a.active,

    border-bottom-color: #111;
    font-weight: 700;
}
nav ul li a:focus,
nav ul li a:active {

    transform: none;
}

/* loader overlay */
#loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#loader .spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg);}}
main {
    display: flex;
    justify-content: center;  
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 400px;
    padding: 60px 20px 20px;
    margin-bottom: 20px;
    text-align: center;
}

.section-row {
    display: flex;
    justify-content: center; 
    gap: 50px; 
}

.list-section, .add-section {
    flex: 0 1 50%;
    max-width: 500px;
    min-width: 350px;
}

.add-section {
    min-height: auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 60px;
}

.add-section form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    padding: 5px;
}

.add-section form label {
    display: block;
    width: 200%;
}

.add-section input {
    width: 80%;
    max-width: 325px;
    box-sizing: border-box;
    margin: 0 auto;
}

.add-section button {
    width: auto;
    padding: 8px 20px;
    align-self: center;
    margin-top: 10px;
}


/* scroller list of students */
.scroll-container {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 20px;
    text-align: left;
}

.scroll-container ul {
    margin: 0;
    padding-left: 20px;
}

.empty-state {
    color: #555;
    font-style: italic;
    list-style: none;
    margin-left: -20px;
    width: calc(100% + 20px);
    text-align: center;
}

footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}

<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1 class="brand-title"><img src="icons/icon-192.png" alt="RaiderAid logo" class="brand-icon"><span class="brand-text">RaiderAid Reminder</span></h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="signup-login.html">Account</a></li>
                <li><a href="learner-list.html" class="current">Learner List</a></li>
                <li><a href="sender.html">Sender</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="section-row">
            <section class="add-section">
                <h2>Add Learners</h2>
                <form>
                    <label>Student Email:<br> <input type="email" name="email"></label>
                    <label>First Name:<br> <input type="text" name="first"></label>
                    <label>Last Name:<br> <input type="text" name="last"></label>
                    <button type="submit">Add</button>
                </form>
            </section>

            <section class="list-section">
                <h2>Learner List</h2>
                <button id="clear-all-btn" type="button">Clear All Learners</button>
                <div class="scroll-container">
                    <ul></ul>
                </div>
            </section>
        </div>
    </main>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// script to store/display learners with edit/delete
(function(){
    const PLAIN_LEARNERS_KEY = "learners";
    const VAULT_KEY = "raideraid_learners_vault_v1";
    const SESSION_PASSPHRASE_KEY = "raideraid_learners_password_v1";
    const VAULT_ITERATIONS = 100000;

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || "").trim());
    }

    function normalizeEmail(email) {
        return String(email || "").trim().toLowerCase();
    }

    function safeParse(json, fallback) {
        try {
            const parsed = JSON.parse(json);
            return Array.isArray(parsed) ? parsed : fallback;
        } catch (_err) {
            return fallback;
        }
    }

    function bufToBase64(buf) {
        const bytes = new Uint8Array(buf);
        let binary = "";
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToBuf(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    async function deriveKey(passphrase, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw",
            enc.encode(passphrase),
            "PBKDF2",
            false,
            ["deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: VAULT_ITERATIONS, hash: "SHA-256" },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    async function encryptLearners(learners, passphrase) {
        const enc = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(passphrase, salt);
        const plaintext = enc.encode(JSON.stringify(learners || []));
        const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext);
        return {
            v: 1,
            salt: bufToBase64(salt.buffer),
            iv: bufToBase64(iv.buffer),
            data: bufToBase64(ciphertext)
        };
    }

    async function decryptLearners(vault, passphrase) {
        const dec = new TextDecoder();
        const salt = new Uint8Array(base64ToBuf(vault.salt || ""));
        const iv = new Uint8Array(base64ToBuf(vault.iv || ""));
        const key = await deriveKey(passphrase, salt);
        const ciphertext = base64ToBuf(vault.data || "");
        const plaintext = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
        const json = dec.decode(plaintext);
        return safeParse(json, []);
    }

    async function promptSetPassword() {
        const password = prompt("Set the password you will use to unlock the learner list.");
        if (!password) return null;
        const confirmPass = prompt("Confirm password.");
        if (confirmPass !== password) {
            alert("Passwords do not match.");
            return null;
        }
        sessionStorage.setItem(SESSION_PASSPHRASE_KEY, password);
        return password;
    }

    async function unlockVault() {
        const cached = sessionStorage.getItem(SESSION_PASSPHRASE_KEY);
        if (cached) return cached;
        const vaultRaw = localStorage.getItem(VAULT_KEY);
        if (!vaultRaw) {
            return promptSetPassword();
        }
        let vault;
        try {
            vault = JSON.parse(vaultRaw);
        } catch (_err) {
            return promptSetPassword();
        }
        while (true) {
            const entered = prompt("Enter your account password to unlock the learner list.");
            if (!entered) return null;
            try {
                await decryptLearners(vault, entered);
                sessionStorage.setItem(SESSION_PASSPHRASE_KEY, entered);
                return entered;
            } catch (_err) {
                alert("Incorrect password.");
            }
        }
    }

    async function ensureVaultReady() {
        if (!window.crypto || !window.crypto.subtle) {
            alert("This browser does not support secure storage.");
            return false;
        }
        const vaultRaw = localStorage.getItem(VAULT_KEY);
        if (vaultRaw) return true;
        const existingPlain = localStorage.getItem(PLAIN_LEARNERS_KEY);
        if (!existingPlain) return true;
        const passphrase = await promptSetPassword();
        if (!passphrase) return false;
        const learners = safeParse(existingPlain, []);
        const vault = await encryptLearners(learners, passphrase);
        localStorage.setItem(VAULT_KEY, JSON.stringify(vault));
        localStorage.removeItem(PLAIN_LEARNERS_KEY);
        return true;
    }

    async function getLearners() {
        await ensureVaultReady();
        const vaultRaw = localStorage.getItem(VAULT_KEY);
        if (!vaultRaw) return [];
        let vault;
        try {
            vault = JSON.parse(vaultRaw);
        } catch (_err) {
            return [];
        }
        const passphrase = await unlockVault();
        if (!passphrase) return [];
        try {
            return await decryptLearners(vault, passphrase);
        } catch (_err) {
            return [];
        }
    }

    async function setLearners(learners) {
        await ensureVaultReady();
        const passphrase = await unlockVault();
        if (!passphrase) return false;
        const vault = await encryptLearners(learners, passphrase);
        localStorage.setItem(VAULT_KEY, JSON.stringify(vault));
        return true;
    }

    async function loadLearners(){
        const ul = document.querySelector('.list-section .scroll-container ul');
        ul.innerHTML = '';
        const learners = await getLearners();
        if (!learners.length) {
            const empty = document.createElement('li');
            empty.className = 'empty-state';
            empty.textContent = 'No students added yet.';
            ul.appendChild(empty);
            return;
        }
        learners.forEach((l,index)=>{
            const li = document.createElement('li');
            li.textContent = l.first + ' ' + l.last + ' ('+l.email+')';

            const edit = document.createElement('button');
            edit.textContent = 'Edit';
            edit.style.marginLeft='10px';
            edit.addEventListener('click',()=>editLearner(index));

            const del = document.createElement('button');
            del.textContent = 'Remove';
            del.style.marginLeft='5px';
            del.addEventListener('click',()=>deleteLearner(index));

            li.appendChild(edit);
            li.appendChild(del);
            ul.appendChild(li);
        });
    }
    async function editLearner(i){
        const learners = await getLearners();
        const l = learners[i];
        if (!l) return;
        const email = prompt('Email', l.email);
        if(email === null) return;
        const cleanEmail = normalizeEmail(email);
        if (!isValidEmail(cleanEmail)) {
            alert('Please enter a valid email address.');
            return;
        }
        const duplicate = learners.some(function(entry, idx){
            return idx !== i && normalizeEmail(entry.email) === cleanEmail;
        });
        if (duplicate) {
            alert('That learner email already exists.');
            return;
        }
        const first = prompt('First name', l.first);
        if(first === null) return;
        const last = prompt('Last name', l.last);
        if(last === null) return;
        const cleanFirst = String(first).trim();
        const cleanLast = String(last).trim();
        if (!cleanFirst || !cleanLast) {
            alert('First and last name are required.');
            return;
        }
        learners[i] = {email: cleanEmail, first: cleanFirst, last: cleanLast};
        await setLearners(learners);
        loadLearners();
    }
    async function deleteLearner(i){
        if(!confirm('Remove this learner?')) return;
        const learners = await getLearners();
        learners.splice(i,1);
        await setLearners(learners);
        loadLearners();
    }

    document.querySelector('.add-section form').addEventListener('submit',function(e){
        e.preventDefault();
        const email = normalizeEmail(this.elements['email'].value);
        const first = this.elements['first'].value.trim();
        const last = this.elements['last'].value.trim();
        if(!email || !first || !last){
            alert('Email, first name, and last name are required.');
            return;
        }
        if (!isValidEmail(email)) {
            alert('Please enter a valid email address.');
            return;
        }
        (async () => {
            const learners = await getLearners();
            const duplicate = learners.some(function(entry){
                return normalizeEmail(entry.email) === email;
            });
            if (duplicate) {
                alert('That learner email already exists.');
                return;
            }
            learners.push({email, first, last});
            const saved = await setLearners(learners);
            if (!saved) return;
            loadLearners();
            this.reset();
        })();
    });

    document.getElementById('clear-all-btn').addEventListener('click', function(){
        (async () => {
            if (!confirm('Clear all learners from this device?')) return;
            await setLearners([]);
            loadLearners();
        })();
    });

    loadLearners();
})();

// initialize firebase and protect page
(function(){
  initRaiderAidFirebase();
  const auth = firebase.auth();
  auth.onAuthStateChanged(async u=>{
    if(!u){
      window.location.replace('signup-login.html');
      return;
    }
    await u.reload();
    if(!u.emailVerified){
      alert('Please verify your email before accessing this page.');
      await auth.signOut();
      window.location.replace('signup-login.html');
      return;
    }
    document.body.style.display = 'block';
  });
})();

// nav highlight script
(function(){
  const current = location.pathname.split('/').pop() || 'home.html';
  const navAuthState = localStorage.getItem("raideraid_nav_auth_state");
  const links = Array.from(document.querySelectorAll('nav ul li a'));
  links.forEach(a=>{
    a.classList.remove('active');
    if(a.getAttribute('href') === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      if (a.textContent.trim() === 'Account' && navAuthState === 'account') {
        a.textContent = 'Account';
      }
      links.forEach(link => link.classList.remove('active', 'current'));
      a.classList.add('active');
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();
</script>
