<head>

<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);

   padding: 0;
   display: none;
}
header {
   background-color: #f1e31ce1;
   color: #fff;
   padding: 20px;
   text-align: center;
}
nav ul {
   list-style-type: none;
   padding: 0;
}
nav ul li {
   display: inline;
   margin-right: 20px;
}
nav ul li a {
   text-decoration: none;
   color: #fff;
}

av ul li a.active,
nav ul li a.current {
    background-color: #eee;
    color: #000;
    padding: 4px 8px;
    border-radius: 4px;
}
nav ul li a:active {
    background-color: #ccc;
}

/* loader overlay */
#loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#loader .spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg);}}
main {
    display: flex;
    justify-content: center;  
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 400px;
    padding: 60px 20px 20px;
    margin-bottom: 20px;
    text-align: center;
}

.section-row {
    display: flex;
    justify-content: center; 
    gap: 50px; 
}

.list-section, .add-section {
    flex: 0 1 50%;
    max-width: 500px;
    min-width: 350px;
}

.add-section {
    min-height: auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 60px;
}

.add-section form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    padding: 5px;
}

.add-section form label {
    display: block;
    width: 200%;
}

.add-section input {
    width: 80%;
    max-width: 325px;
    box-sizing: border-box;
    margin: 0 auto;
}

.add-section button {
    width: auto;
    padding: 8px 20px;
    align-self: center;
    margin-top: 10px;
}


/* scroller list of students */
.scroll-container {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 20px;
    text-align: left;
}

.scroll-container ul {
    margin: 0;
    padding-left: 20px;
}
footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}
</style>

</head>

<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1>RaiderAid Reminder</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="#"> </a></li>
                <li><a href="signup-login.html">Sign-Up/Login</a></li>
                <li><a href="#"> </a></li>
                <li><a href="learner-list.html" class="current">Learner List</a></li>
                <li><a href="#"> </a></li>
                <li><a href="sender.html">Sender</a></li>
                <li><a href="#" id="logout-link" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="section-row">
            <section class="add-section">
                <h2>Add Learners</h2>
                <form>
                    <label>Student Email:<br> <input type="email" name="email"></label>
                    <label>First Name:<br> <input type="text" name="first"></label>
                    <label>Last Name:<br> <input type="text" name="last"></label>
                    <button type="submit">Add</button>
                </form>
            </section>

            <section class="list-section">
                <h2>Learner List</h2>
                <div class="scroll-container">
                    <ul>
                        <li>Learner A</li>
                        <li>Learner B</li>
                        <li>Learner C</li>
                        <li>Learner D</li>
                        <li>Learner E</li>
                    </ul>
                </div>
            </section>
        </div>
    </main>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
// script to store/display learners with edit/delete
(function(){
    function loadLearners(){
        const ul = document.querySelector('.list-section .scroll-container ul');
        ul.innerHTML = '';
        const learners = JSON.parse(localStorage.getItem('learners')||'[]');
        learners.forEach((l,index)=>{
            const li = document.createElement('li');
            li.textContent = l.first + ' ' + l.last + ' ('+l.email+')';

            const edit = document.createElement('button');
            edit.textContent = 'Edit';
            edit.style.marginLeft='10px';
            edit.addEventListener('click',()=>editLearner(index));

            const del = document.createElement('button');
            del.textContent = 'Remove';
            del.style.marginLeft='5px';
            del.addEventListener('click',()=>deleteLearner(index));

            li.appendChild(edit);
            li.appendChild(del);
            ul.appendChild(li);
        });
    }
    function editLearner(i){
        const learners = JSON.parse(localStorage.getItem('learners')||'[]');
        const l = learners[i];
        const email = prompt('Email', l.email);
        if(email === null) return;
        const first = prompt('First name', l.first);
        if(first === null) return;
        const last = prompt('Last name', l.last);
        if(last === null) return;
        learners[i] = {email, first, last};
        localStorage.setItem('learners', JSON.stringify(learners));
        loadLearners();
    }
    function deleteLearner(i){
        if(!confirm('Remove this learner?')) return;
        const learners = JSON.parse(localStorage.getItem('learners')||'[]');
        learners.splice(i,1);
        localStorage.setItem('learners', JSON.stringify(learners));
        loadLearners();
    }

    document.querySelector('.add-section form').addEventListener('submit',function(e){
        e.preventDefault();
        const email = this.elements['email'].value.trim();
        const first = this.elements['first'].value.trim();
        const last = this.elements['last'].value.trim();
        if(email && first && last){
            const learners = JSON.parse(localStorage.getItem('learners')||'[]');
            learners.push({email,first,last});
            localStorage.setItem('learners', JSON.stringify(learners));
            loadLearners();
            this.reset();
        }
    });
    loadLearners();
})();

// initialize firebase and protect page
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAzpQdDjGyNr-Cu6VcvrcJPTELT-4D3Dtc",
    authDomain: "raideraid-374c7.firebaseapp.com",
    projectId: "raideraid-374c7",
  };
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const auth = firebase.auth();
  auth.onAuthStateChanged(async u=>{
    if(!u){
      window.location.replace('signup-login.html');
      return;
    }
    await u.reload();
    if(!u.emailVerified){
      alert('Please verify your email before accessing this page.');
      await auth.signOut();
      window.location.replace('signup-login.html');
      return;
    }
    const logoutLink = document.getElementById('logout-link');
    logoutLink.style.display = 'inline';
    logoutLink.addEventListener('click', async ev=>{
      ev.preventDefault();
      await auth.signOut();
      window.location.replace('signup-login.html');
    });
    document.body.style.display = 'block';
  });
})();

// nav highlight script
(function(){
  const current = location.pathname.split('/').pop();
  document.querySelectorAll('nav ul li a').forEach(a=>{
    const href = a.getAttribute('href');
    if(a.href === location.href || href === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();
</script>
