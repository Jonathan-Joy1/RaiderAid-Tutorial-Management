<!DOCTYPE html>
<html lang="en">
<head>
    <title>Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a2470">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="Visual_Layout.css">
<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);
   margin: 0;
   padding: 0;
}
header {
   background-color: #f1e31ce1;
   color: #fff;
   padding: 20px;
   text-align: center;
}

.brand-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    font-size: 2rem;
    line-height: 1.1;
    font-weight: 600;
    letter-spacing: 0.3px;
}

.brand-text {
    color: #ffffff !important;
    text-shadow: none;
}

.brand-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
}
nav ul {
   list-style-type: none;
   padding: 0;
   margin: 0;
   display: flex;
   flex-wrap: nowrap;
   justify-content: center;
   align-items: stretch;
   gap: 8px;
}
nav ul li {
   display: flex;
   align-items: stretch;
   flex: 0 0 112px;
   height: 44px;
}
nav ul li a {
   text-decoration: none;
   color: #111;
   font-weight: 400;
   display: block;
   text-align: center;
   height: 100%;
   line-height: 44px;
   padding: 0;
   box-sizing: border-box;
   width: 100%;
   white-space: nowrap;
   position: relative;
   top: 0;
   transform: none;
   transition: none;
   -webkit-tap-highlight-color: transparent;
   border-bottom: 2px solid rgba(17, 17, 17, 0.35);
}

nav ul li a.active,
nav ul li a.current {
    color: #000;
    border-bottom-color: #111;
    font-weight: 700;
}
nav ul li a:focus,
nav ul li a:active {
    top: 0;
    transform: none;
}

#loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#loader .spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg);}}

main {
    display: flex;
    justify-content: center;
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 400px;
    padding: 60px 20px 20px;
    width: 600px;
    margin-bottom: 20px;
    text-align: left;

}
footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}

.auth-row {
    display: none;
    gap: 40px;
    justify-content: center;
}

.auth-box {
    background: #fafafa;
    padding: 20px;
    border-radius: 4px;
    width: 260px;
    box-sizing: border-box;
}

.auth-box h2 {
    text-align: center;
}

.field {
    margin-bottom: 15px;
}

.auth-box button {
    display: block;
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    cursor: pointer;
}

#auth-message {
    margin-top: 18px;
    padding: 10px;
    border-radius: 4px;
    display: none;
    font-size: 0.95rem;
    line-height: 1.35;
}

#auth-message.success {
    background: #e7f7eb;
    color: #1e6b32;
}

#auth-message.error {
    background: #fde8e8;
    color: #8b1f1f;
}

#resend-verification {
    margin-top: 10px;
    display: none;
    width: 260px;
    padding: 10px;
}

#logged-in-panel {
    display: none;
    margin: 0 auto;
    max-width: 360px;
    text-align: center;
}

#auth-loading {
    margin: 0 auto;
    max-width: 360px;
    text-align: center;
    background: #fafafa;
    padding: 20px;
    border-radius: 4px;
}

#signout-btn {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    cursor: pointer;
}

#resend-verification-panel {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 1rem;
    cursor: pointer;
}

</style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1 class="brand-title"><img src="icons/icon-192.png" alt="RaiderAid logo" class="brand-icon"><span class="brand-text">RaiderAid Reminder</span></h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="signup-login.html" id="auth-nav-link" class="current">Account</a></li>
                <li><a href="learner-list.html">Learner List</a></li>
                <li><a href="sender.html">Sender</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <div class="auth-row" hidden>
                <div class="auth-box login-box">
                    <h2>Login</h2>
                    <form id="login-form">
                        <div class="field">
                            <label for="login-email">Email</label><br>
                            <input type="email" id="login-email" name="email" required>
                        </div>
                        <div class="field">
                            <label for="login-password">Password</label><br>
                            <input type="password" id="login-password" name="password" required>
                        </div>
                        <button type="submit">Log In</button>
                    </form>
                    <button id="resend-verification" type="button">Resend Verification Email</button>
                </div>

                <div class="auth-box signup-box">
                    <h2>Sign Up</h2>
                    <form id="signup-form">
                        <div class="field">
                            <label for="signup-email">Email</label><br>
                            <input type="email" id="signup-email" name="email" required>
                        </div>
                        <div class="field">
                            <label for="signup-first">First Name</label><br>
                            <input type="text" id="signup-first" name="first" required>
                        </div>
                        <div class="field">
                            <label for="signup-last">Last Name</label><br>
                            <input type="text" id="signup-last" name="last" required>
                        </div>
                        <div class="field">
                            <label for="signup-password">Password</label><br>
                            <input type="password" id="signup-password" name="password" required>
                        </div>
                        <button type="submit">Sign Up</button>
                    </form>
                </div>
            </div>
            <div id="auth-loading">Loading account...</div>
            <div id="logged-in-panel" class="auth-box">
                <h2>Account</h2>
                <p id="logged-in-email"></p>
                <button id="resend-verification-panel" type="button" style="display:none;">Resend Verification Email</button>
                <button id="signout-btn" type="button">Sign Out</button>
            </div>
            <div id="auth-message"></div>
        </section>
    </main>
<script>
(function(){
  const current = location.pathname.split('/').pop() || 'home.html';
  const links = Array.from(document.querySelectorAll('nav ul li a'));
  links.forEach(a=>{
    a.classList.remove('active');
    if(a.getAttribute('href') === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      links.forEach(link => link.classList.remove('active', 'current'));
      a.classList.add('active');
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();
</script>
    <footer>
        <p>&copy; 2026 RaiderAid Reminder. All rights reserved.</p>
    </footer>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  initRaiderAidFirebase();
  const auth = firebase.auth();
  let lastUnverifiedUser = null;
  const authRow = document.querySelector('.auth-row');
  const authLoading = document.getElementById('auth-loading');
  const loggedInPanel = document.getElementById('logged-in-panel');
  const loggedInEmail = document.getElementById('logged-in-email');
  const authNavLink = document.getElementById('auth-nav-link');
  const resendButton = document.getElementById('resend-verification');
  const resendPanelButton = document.getElementById('resend-verification-panel');

  function showAuthMessage(message, type){
    const box = document.getElementById('auth-message');
    box.textContent = message;
    box.className = '';
    if (type) box.classList.add(type);
    box.style.display = 'block';
  }

  function showResendButton(show){
    resendButton.style.display = show ? 'block' : 'none';
  }

  function showResendPanelButton(show){
    resendPanelButton.style.display = show ? 'block' : 'none';
  }

  function applyNavState(){
    authNavLink.textContent = 'Account';
    authNavLink.setAttribute('href', 'signup-login.html');
  }

  function showAuthForms(){
    authLoading.style.display = 'none';
    authRow.hidden = false;
    authRow.style.display = 'flex';
    showResendButton(false);
    showResendPanelButton(false);
    loggedInPanel.style.display = 'none';
    authNavLink.textContent = 'Account';
    authNavLink.setAttribute('href', 'signup-login.html');
  }

  function showSignedInPanel(user, verified){
    authLoading.style.display = 'none';
    authRow.hidden = true;
    authRow.style.display = 'none';
    showResendButton(false);
    showResendPanelButton(!verified);
    loggedInPanel.style.display = 'block';
    loggedInEmail.textContent = user.email ? ('Signed in as ' + user.email) : '';
    authNavLink.textContent = 'Account';
    authNavLink.setAttribute('href', 'signup-login.html');
  }

  function formatAuthError(err){
    if (!err) return 'Unknown error. Please try again.';
    if (err.code) return err.code + ': ' + err.message;
    return err.message || String(err);
  }

  async function sendVerificationEmail(user){
    if (!user) throw new Error('No signed-in user found for verification email.');
    await user.sendEmailVerification();
  }

  auth.onAuthStateChanged(async user=>{
    if(!user){
      showAuthForms();
      return;
    }
    if (user.emailVerified) {
      showSignedInPanel(user, true);
      showAuthMessage('You are signed in. Use Learner List or Sender, or sign out here.', 'success');
      return;
    }
    lastUnverifiedUser = user;
    showSignedInPanel(user, false);
    showAuthMessage('Your email is not verified yet. Click "Resend Verification Email" and check inbox/spam.', 'error');
  });

  applyNavState();

  document.getElementById('signup-form').addEventListener('submit', e=>{
    e.preventDefault();
    const email = e.target['signup-email'].value;
    const password = e.target['signup-password'].value;
    auth.createUserWithEmailAndPassword(email,password)
      .then(async cred=>{
        lastUnverifiedUser = cred.user;
        await sendVerificationEmail(cred.user);
        showSignedInPanel(cred.user, false);
        showAuthMessage('Account created. Verification email sent. Check inbox/spam.', 'success');
        e.target.reset();
      })
      .catch(err=>showAuthMessage(formatAuthError(err), 'error'));
  });

  document.getElementById('login-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const email = e.target['login-email'].value;
    const password = e.target['login-password'].value;
    try {
      const cred = await auth.signInWithEmailAndPassword(email,password);
      if (!cred.user.emailVerified) {
        lastUnverifiedUser = cred.user;
        showSignedInPanel(cred.user, false);
        showAuthMessage('Your email is not verified yet. Click "Resend Verification Email" and check inbox/spam.', 'error');
        return;
      }
      showSignedInPanel(cred.user, true);
      showAuthMessage('You are signed in. Use Learner List or Sender, or sign out here.', 'success');
    } catch (err) {
      showAuthForms();
      showResendButton(false);
      showAuthMessage(formatAuthError(err), 'error');
    }
  });

  async function resendVerificationEmail(){
    try {
      const user = auth.currentUser || lastUnverifiedUser;
      if (!user) {
        showAuthMessage('Log in first to resend verification email.', 'error');
        return;
      }
      await sendVerificationEmail(user);
      showAuthMessage('Verification email resent. Check inbox/spam.', 'success');
    } catch (err) {
      showAuthMessage(formatAuthError(err), 'error');
    }
  }

  document.getElementById('resend-verification').addEventListener('click', async ()=>{
    await resendVerificationEmail();
  });

  resendPanelButton.addEventListener('click', async ()=>{
    await resendVerificationEmail();
  });

  async function doSignOut(){
    await auth.signOut();
    showAuthForms();
    showAuthMessage('Signed out.', 'success');
  }

  document.getElementById('signout-btn').addEventListener('click', async ()=>{
    await doSignOut();
  });

</script>
<script src="pwa-register.js"></script>
</body>
</html>
