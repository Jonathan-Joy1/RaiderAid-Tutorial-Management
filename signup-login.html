<!DOCTYPE html>
<html>
<head>
    <title>Sign-Up/Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="Visual_Layout.css">
<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);
   margin: 0;
   padding: 0;
}
header {
   background-color: #f1e31ce1;
   color: #fff;
   padding: 20px;
   text-align: center;
}
nav ul {
   list-style-type: none;
   padding: 0;
}
nav ul li {
   display: inline;
   margin-right: 20px;
}
nav ul li a {
   text-decoration: none;
   color: #fff;
}

nav ul li a.active,
nav ul li a.current {
    background-color: #eee;
    color: #000;
    padding: 4px 8px;
    border-radius: 4px;
}
nav ul li a:active {
    background-color: #ccc;
}

#loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#loader .spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg);}}

main {
    display: flex;
    justify-content: center;
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 400px;
    padding: 60px 20px 20px;
    width: 600px;
    margin-bottom: 20px;
    text-align: left;

}
footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}

.auth-row {
    display: flex;
    gap: 40px;
    justify-content: center;
}

.auth-box {
    background: #fafafa;
    padding: 20px;
    border-radius: 4px;
    width: 260px;
    box-sizing: border-box;
}

.auth-box h2 {
    text-align: center;
}

.field {
    margin-bottom: 15px;
}

.auth-box button {
    display: block;
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    cursor: pointer;
}

</style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1>RaiderAid Reminder</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="#"> </a></li>
                <li><a href="signup-login.html" class="current">Sign-Up/Login</a></li>
                <li><a href="#"> </a></li>
                <li><a href="learner-list.html">Learner List</a></li>
                <li><a href="#"> </a></li>
                <li><a href="sender.html">Sender</a></li>
                <li><a href="#" id="logout-link" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <div class="auth-row">
                <div class="auth-box login-box">
                    <h2>Login</h2>
                    <form id="login-form">
                        <div class="field">
                            <label for="login-email">Email</label><br>
                            <input type="email" id="login-email" name="email" required>
                        </div>
                        <div class="field">
                            <label for="login-password">Password</label><br>
                            <input type="password" id="login-password" name="password" required>
                        </div>
                        <button type="submit">Log In</button>
                    </form>
                </div>

                <div class="auth-box signup-box">
                    <h2>Sign Up</h2>
                    <form id="signup-form">
                        <div class="field">
                            <label for="signup-email">Email</label><br>
                            <input type="email" id="signup-email" name="email" required>
                        </div>
                        <div class="field">
                            <label for="signup-first">First Name</label><br>
                            <input type="text" id="signup-first" name="first" required>
                        </div>
                        <div class="field">
                            <label for="signup-last">Last Name</label><br>
                            <input type="text" id="signup-last" name="last" required>
                        </div>
                        <div class="field">
                            <label for="signup-password">Password</label><br>
                            <input type="password" id="signup-password" name="password" required>
                        </div>
                        <button type="submit">Sign Up</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
<script>
(function(){
  const current = location.pathname.split('/').pop();
  document.querySelectorAll('nav ul li a').forEach(a=>{
    const href = a.getAttribute('href');
    if(a.href === location.href || href === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();
</script>
    <footer>
        <p>&copy; 2026 RaiderAid Reminder. All rights reserved.</p>
    </footer>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAzpQdDjGyNr-Cu6VcvrcJPTELT-4D3Dtc",
    authDomain: "raideraid-374c7.firebaseapp.com",
    projectId: "raideraid-374c7",
    storageBucket: "raideraid-374c7.firebasestorage.app",
    messagingSenderId: "87161799131",
    appId: "1:87161799131:web:e2efe81532490595bfe7fe"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  auth.onAuthStateChanged(user=>{
    if(user) {
      window.location.href='learner-list.html';
    }
  });

  document.getElementById('signup-form').addEventListener('submit', e=>{
    e.preventDefault();
    const email = e.target['signup-email'].value;
    const password = e.target['signup-password'].value;
    auth.createUserWithEmailAndPassword(email,password)
      .then(()=>{ window.location='learner-list.html'; })
      .catch(err=>alert(err.message));
  });

  document.getElementById('login-form').addEventListener('submit', e=>{
    e.preventDefault();
    const email = e.target['login-email'].value;
    const password = e.target['login-password'].value;
    auth.signInWithEmailAndPassword(email,password)
      .then(()=>{ window.location='learner-list.html'; })
      .catch(err=>alert(err.message));
  });
</script>
</body>
</html>
