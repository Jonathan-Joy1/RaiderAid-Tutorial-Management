<!DOCTYPE html>
<html>
<head>
    <title>Sender</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="Visual_Layout.css">

<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);
   margin: 0;
   padding: 0;
}
header {
   background-color: #f1e31ce1;
   color: #fff;
   padding: 20px;
   text-align: center;
}
nav ul {
   list-style-type: none;
   padding: 0;
}
nav ul li {
   display: inline;
   margin-right: 20px;
}
nav ul li a {
   text-decoration: none;
   color: #fff;
}

nav ul li a.active,
nav ul li a.current {
    background-color: #eee;
    color: #000;
    padding: 4px 8px;
    border-radius: 4px;
}
nav ul li a:active {
    background-color: #ccc;
}
main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 300px;
    padding: 60px 20px 20px;
    width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

.scroll-container {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 20px;
    text-align: left;
}

.selection-part {
    margin-bottom: 20px;
}

.location-part {
    margin: 20px 0;
    text-align: left;
}

.location-part input {
    width: 100%;
    max-width: 400px;
    box-sizing: border-box;
    padding: 5px;
}

.button-container {
    margin-top: 20px;
}

#send-btn {
    padding: 10px 20px;
    font-size: 1rem;
}
footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}
</style>
</head>

<body>
    <header>
        <h1>RaiderAid Reminder</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="#"> </a></li>
                <li><a href="signup-login.html">Sign-Up/Login</a></li>
                <li><a href="#"> </a></li>
                <li><a href="learner-list.html">Learner List</a></li>
                <li><a href="#"> </a></li>
                <li><a href="sender.html" class="current">Sender</a></li>
                <li><a href="#" id="logout-link" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="list-section">
            <div class="selection-part">
                <h2>Select Students to Remind:</h2>
                <div class="scroll-container">
                    <ul>
                        <li><label><input type="checkbox"/> Learner A</label></li>
                        <li><label><input type="checkbox"/> Learner B</label></li>
                        <li><label><input type="checkbox"/> Learner C</label></li>
                        <li><label><input type="checkbox"/> Learner D</label></li>
                        <li><label><input type="checkbox"/> Learner E</label></li> 
                    </ul>
                </div>
            </div>
            <div class="location-part">
                <h3 style="text-align:center;">Enter Student Locations</h3>
                <form id="location-form">
                    <label>Location for selected students:<br>
                        <input type="text" name="location" placeholder="e.g. Room 101">
                    </label>
                </form>
            </div>
            <div class="button-container">
                <button id="send-btn">Send Reminder</button>
            </div>
        </section>

<script>
function populateLearners(){
    const learners = JSON.parse(localStorage.getItem('learners')||'[]');
    const ul = document.querySelector('.scroll-container ul');
    ul.innerHTML = '';
    learners.forEach((l,index)=>{
        const li = document.createElement('li');
        const chk = document.createElement('input');
        chk.type='checkbox';
        chk.value=index;
        const label = document.createElement('label');
        label.appendChild(chk);
        label.append(' ' + l.first + ' ' + l.last + ' ('+l.email+')');
        li.appendChild(label);
        ul.appendChild(li);
    });
}
populateLearners();
window.addEventListener('storage', e=>{
    if(e.key==='learners') populateLearners();
});

(function(){
  if(typeof firebase==='undefined'){
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js';
    document.head.appendChild(s1);
    document.head.appendChild(s2);
    s2.onload = initAuth;
  } else initAuth();
  function initAuth(){
    const firebaseConfig = {
      apiKey: "AIzaSyAzpQdDjGyNr-Cu6VcvrcJPTELT-4D3Dtc",
      authDomain: "raideraid-374c7.firebaseapp.com",
      projectId: "raideraid-374c7",
    };
    firebase.initializeApp(firebaseConfig);
    firebase.auth().onAuthStateChanged(u=>{
      if(!u) window.location='signup-login.html';
    });
  }
})();

(function(){
  const current = location.pathname.split('/').pop();
  document.querySelectorAll('nav ul li a').forEach(a=>{
    const href = a.getAttribute('href');
    if(a.href === location.href || href === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();

document.getElementById('send-btn').addEventListener('click', function(){
    const learners = JSON.parse(localStorage.getItem('learners')||'[]');
    const checked = Array.from(document.querySelectorAll('.scroll-container input[type=checkbox]:checked'))
        .map(cb=>learners[cb.value]?.email)
        .filter(Boolean);
    if(checked.length){
        alert('Email(s) successfully sent)');
    } else {
        alert('Please select at least one student');
    }
});
</script>
    </main>
<script>
(function(){
  const current = location.pathname.split('/').pop();
  document.querySelectorAll('nav ul li a').forEach(a=>{
    const href = a.getAttribute('href');
    if(a.href === location.href || href === current){ a.classList.add('active'); }
  });
})();
</script>

</html>
