flex: 1;

.location-part label {

.location-part input {

.field-note {

.location-part textarea {

<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1 class="brand-title"><img src="icons/icon-192.png" alt="RaiderAid logo" class="brand-icon"><span class="brand-text">RaiderAid Reminder</span></h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>

    <main>
        <section class="list-section">
            <div class="selection-part">
                <h2>Select Student(s) to Remind:</h2>
                <div id="sender-empty-hint" class="list-empty-hint" style="display:none;">No students added yet.</div>
                <div class="scroll-container">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let authInstance;
const EMAILJS_CONFIG = {
    publicKey: "QTD4OCJRyBm4ObJFA",
    serviceId: "service_0nga3ei",
    templateId: "template_l6l82d6"
};
const PLAIN_LEARNERS_KEY = "learners";
const VAULT_KEY = "raideraid_learners_vault_v1";
const SESSION_PASSPHRASE_KEY = "raideraid_learners_passphrase_v1";
const VAULT_ITERATIONS = 100000;
const APP_BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "");
const CONFIRM_LINK_TTL_MS = 1000 * 60 * 60 * 24 * 7;
const MAX_RECIPIENTS_PER_SEND = 25;
const SEND_COOLDOWN_MS = 15000;
const MIN_SEND_DELAY_MS = 5000;
const DAILY_SEND_HISTORY_KEY = "raideraid_daily_send_history_v1";
let lastSendStartedAt = 0;
const senderPageLoadedAt = Date.now();

function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
}

function normalizeEmail(value) {
    return String(value || "").trim().toLowerCase();
}

function safeParse(json, fallback) {
    try {
        const parsed = JSON.parse(json);
        return Array.isArray(parsed) ? parsed : fallback;
    } catch (_err) {
        return fallback;
    }
}

function bufToBase64(buf) {
    const bytes = new Uint8Array(buf);
    let binary = "";
    for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

function base64ToBuf(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

async function deriveKey(passphrase, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await window.crypto.subtle.importKey(
        "raw",
        enc.encode(passphrase),
        "PBKDF2",
        false,
        ["deriveKey"]
    );
    return window.crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: VAULT_ITERATIONS, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

async function decryptLearners(vault, passphrase) {
    const dec = new TextDecoder();
    const salt = new Uint8Array(base64ToBuf(vault.salt || ""));
    const iv = new Uint8Array(base64ToBuf(vault.iv || ""));
    const key = await deriveKey(passphrase, salt);
    const ciphertext = base64ToBuf(vault.data || "");
    const plaintext = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
    const json = dec.decode(plaintext);
    return safeParse(json, []);
}

async function unlockVault() {
    const cached = sessionStorage.getItem(SESSION_PASSPHRASE_KEY);
    if (cached) return cached;
    const vaultRaw = localStorage.getItem(VAULT_KEY);
    if (!vaultRaw) return null;
    let vault;
    try {
        vault = JSON.parse(vaultRaw);
    } catch (_err) {
        return null;
    }
    while (true) {
        const entered = prompt("Enter your learner list passphrase.");
        if (!entered) return null;
        try {
            await decryptLearners(vault, entered);
            sessionStorage.setItem(SESSION_PASSPHRASE_KEY, entered);
            return entered;
        } catch (_err) {
            alert("Incorrect passphrase.");
        }
    }
}

async function ensureVaultReady() {
    if (!window.crypto || !window.crypto.subtle) {
        alert("This browser does not support secure storage.");
        return false;
    }
    const vaultRaw = localStorage.getItem(VAULT_KEY);
    if (vaultRaw) return true;
    const existingPlain = localStorage.getItem(PLAIN_LEARNERS_KEY);
    if (!existingPlain) return true;
    const passphrase = prompt("Set a passphrase to lock learner data on this device.");
    if (!passphrase) return false;
    const confirmPass = prompt("Confirm passphrase.");
    if (confirmPass !== passphrase) {
        alert("Passphrases do not match.");
        return false;
    }
    sessionStorage.setItem(SESSION_PASSPHRASE_KEY, passphrase);
    const learners = safeParse(existingPlain, []);
    const vault = await (async () => {
        const enc = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(passphrase, salt);
        const plaintext = enc.encode(JSON.stringify(learners || []));
        const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext);
        return {
            v: 1,
            salt: bufToBase64(salt.buffer),
            iv: bufToBase64(iv.buffer),
            data: bufToBase64(ciphertext)
        };
    })();
    localStorage.setItem(VAULT_KEY, JSON.stringify(vault));
    localStorage.removeItem(PLAIN_LEARNERS_KEY);
    return true;
}

async function getLearners() {
    await ensureVaultReady();
    const vaultRaw = localStorage.getItem(VAULT_KEY);
    if (!vaultRaw) return [];
    let vault;
    try {
        vault = JSON.parse(vaultRaw);
    } catch (_err) {
        return [];
    }
    const passphrase = await unlockVault();
    if (!passphrase) return [];
    try {
        return await decryptLearners(vault, passphrase);
    } catch (_err) {
        return [];
    }
}

function getTodayLocalDateKey() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return year + "-" + month + "-" + day;
}

function getDailySendHistory() {
    try {
        const parsed = JSON.parse(localStorage.getItem(DAILY_SEND_HISTORY_KEY) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
    } catch (_err) {
        return {};
    }
}

function setDailySendHistory(history) {
    localStorage.setItem(DAILY_SEND_HISTORY_KEY, JSON.stringify(history || {}));
}

function isEmailJsConfigured() {
    return EMAILJS_CONFIG.publicKey &&
        EMAILJS_CONFIG.serviceId &&
        EMAILJS_CONFIG.templateId &&
        !EMAILJS_CONFIG.publicKey.includes("YOUR_") &&
        !EMAILJS_CONFIG.serviceId.includes("YOUR_") &&
        !EMAILJS_CONFIG.templateId.includes("YOUR_");
}

function buildConfirmLink(toEmail, learnerName, senderEmail, senderName, location, description) {
    const base = APP_BASE_URL.replace(/\/$/, "");
    const payload = {
        learner_email: toEmail,
        learner_name: learnerName || "",
        sender_email: senderEmail || "raideraid-reminder",
        sender_name: senderName || "Your teacher",
        location: location,
        description: description || "",
        expires_at: Date.now() + CONFIRM_LINK_TTL_MS,
        nonce: (window.crypto && window.crypto.randomUUID)
            ? window.crypto.randomUUID()
            : String(Date.now()) + Math.random().toString(16).slice(2)
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    return base + "/confirm-attendance.html?data=" + encodeURIComponent(encoded);
}

async function sendEmailViaEmailJS(toEmail, learnerName, location, senderEmail, senderName, description) {
    const confirmLink = buildConfirmLink(toEmail, learnerName, senderEmail, senderName, location, description);
    const response = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            service_id: EMAILJS_CONFIG.serviceId,
            template_id: EMAILJS_CONFIG.templateId,
            user_id: EMAILJS_CONFIG.publicKey,
            template_params: {
                to_email: toEmail,
                learner_name: learnerName || "",
                location: location,
                description: description || "",
                sender_email: senderEmail || "raideraid-reminder",
                sender_name: senderName || "Your teacher",
                confirm_link: confirmLink
            }
        })
    });

    if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || ("EmailJS HTTP " + response.status));
    }
}

async function populateLearners(){
    const learners = await getLearners();
    const ul = document.querySelector('.scroll-container ul');
    const emptyHint = document.getElementById('sender-empty-hint');
    ul.innerHTML = '';
    if (!learners.length) {
        emptyHint.style.display = 'block';
        return;
    }
    emptyHint.style.display = 'none';
    learners.forEach((l,index)=>{
        const li = document.createElement('li');
        const chk = document.createElement('input');
        chk.type='checkbox';
        chk.value=index;
        const label = document.createElement('label');
        label.appendChild(chk);
        label.append(' ' + l.first + ' ' + l.last + ' ('+l.email+')');
        li.appendChild(label);
        ul.appendChild(li);
    });
}

function deriveSenderName(nameValue, emailValue) {
    const cleanName = (nameValue || "").trim();
    if (cleanName) return cleanName;

    const localPart = String(emailValue || "").split("@")[0].trim();
    if (!localPart) return "Your teacher";

    return localPart
        .replace(/[._-]+/g, " ")
        .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

populateLearners();
window.addEventListener('storage', e=>{
    if(e.key===VAULT_KEY || e.key===PLAIN_LEARNERS_KEY) populateLearners();
});

(function(){
  initRaiderAidFirebase();
  authInstance = firebase.auth();

  authInstance.onAuthStateChanged(async u=>{
    if(!u){
      window.location.replace('signup-login.html');
      return;
    }
    await u.reload();
    if(!u.emailVerified){
      alert('Please verify your email before accessing this page.');
      await authInstance.signOut();
      window.location.replace('signup-login.html');
      return;
    }
    const teacherEmailInput = document.querySelector('#location-form input[name=teacher_email]');
    if (teacherEmailInput && u.email) {
      teacherEmailInput.value = u.email;
    }
    const teacherNameInput = document.querySelector('#location-form input[name=teacher_name]');
    if (teacherNameInput && u.displayName) {
      teacherNameInput.value = u.displayName;
    }
    document.body.style.display = 'block';
  });
})();

(function(){
  const current = location.pathname.split('/').pop() || 'home.html';
  const navAuthState = localStorage.getItem("raideraid_nav_auth_state");
  const links = Array.from(document.querySelectorAll('nav ul li a'));
  links.forEach(a=>{
    a.classList.remove('active');
    if(a.getAttribute('href') === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      if (a.textContent.trim() === 'Account' && navAuthState === 'account') {
        a.textContent = 'Account';
      }
      links.forEach(link => link.classList.remove('active', 'current'));
      a.classList.add('active');
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();

document.getElementById('send-btn').addEventListener('click', async function(){
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('send-status');
    const currentUser = authInstance && authInstance.currentUser ? authInstance.currentUser : null;
    const learners = await getLearners();
    const selectedLearners = Array.from(document.querySelectorAll('.scroll-container input[type=checkbox]:checked'))
        .map(function (cb) {
            const learner = learners[cb.value];
            if (!learner || !learner.email) return null;
            const first = (learner.first || "").trim();
            const last = (learner.last || "").trim();
            const fullName = (first + " " + last).trim();
            const cleanEmail = normalizeEmail(learner.email);
            if (!isValidEmail(cleanEmail)) return null;
            return {
                email: cleanEmail,
                name: fullName || cleanEmail
            };
        })
        .filter(Boolean);
    const uniqueSelectedLearners = [];
    const seenEmails = new Set();
    selectedLearners.forEach(function(learner){
        if (seenEmails.has(learner.email)) return;
        seenEmails.add(learner.email);
        uniqueSelectedLearners.push(learner);
    });
    const location = document.querySelector('#location-form input[name=location]').value.trim();
    const teacherEmailInput = document.querySelector('#location-form input[name=teacher_email]');
    if (teacherEmailInput && currentUser && currentUser.email) {
        teacherEmailInput.value = currentUser.email;
    }
    const teacherEmail = teacherEmailInput ? normalizeEmail(teacherEmailInput.value) : '';
    const teacherName = document.querySelector('#location-form input[name=teacher_name]').value.trim();
    const description = document.querySelector('#location-form textarea[name=description]').value.trim();
    const honeypotField = document.querySelector('#location-form input[name=website_url]');
    const honeypotValue = honeypotField ? honeypotField.value.trim() : '';

    if(!uniqueSelectedLearners.length){
        status.textContent = '';
        alert('Please select at least one student with a valid email.');
        return;
    }
    if(uniqueSelectedLearners.length > MAX_RECIPIENTS_PER_SEND){
        status.textContent = '';
        alert('Please send to at most ' + MAX_RECIPIENTS_PER_SEND + ' students at a time.');
        return;
    }
    if(!location){
        status.textContent = '';
        alert('Please enter a location before sending.');
        return;
    }
    if(!teacherEmail){
        status.textContent = '';
        alert('Please enter the teacher response email.');
        return;
    }
    if(!isValidEmail(teacherEmail)){
        status.textContent = '';
        alert('Teacher email is invalid.');
        return;
    }
    if(!teacherName){
        status.textContent = '';
        alert('Please enter the teacher name.');
        return;
    }
    if(!description){
        status.textContent = '';
        alert('Please enter a description before sending.');
        return;
    }
    if(honeypotValue){
        status.textContent = '';
        alert('Unable to send right now. Please refresh and try again.');
        return;
    }
    if(Date.now() - senderPageLoadedAt < MIN_SEND_DELAY_MS){
        const waitSeconds = Math.ceil((MIN_SEND_DELAY_MS - (Date.now() - senderPageLoadedAt)) / 1000);
        status.textContent = '';
        alert('Please wait ' + waitSeconds + ' second(s) before sending.');
        return;
    }
    if(!isEmailJsConfigured()){
        status.textContent = '';
        alert('EmailJS is not configured yet. Update EMAILJS_CONFIG in sender.html.');
        return;
    }
    if(sendBtn.disabled){
        return;
    }
    const now = Date.now();
    if(now - lastSendStartedAt < SEND_COOLDOWN_MS){
        const waitSeconds = Math.ceil((SEND_COOLDOWN_MS - (now - lastSendStartedAt)) / 1000);
        status.textContent = '';
        alert('Please wait ' + waitSeconds + ' second(s) before sending again.');
        return;
    }

    const todayKey = getTodayLocalDateKey();
    const sendHistory = getDailySendHistory();
    const blockedByDailyLimit = uniqueSelectedLearners.filter(function (learner) {
        return sendHistory[learner.email] === todayKey;
    });
    const eligibleLearners = uniqueSelectedLearners.filter(function (learner) {
        return sendHistory[learner.email] !== todayKey;
    });

    if(!eligibleLearners.length){
        const blockedList = blockedByDailyLimit.map(function (l) { return l.email; }).join(', ');
        status.textContent = '';
        alert('Already sent today for selected student(s): ' + blockedList);
        return;
    }

    if(blockedByDailyLimit.length){
        const blockedList = blockedByDailyLimit.map(function (l) { return l.email; }).join(', ');
        alert('Skipping already-sent-today student(s): ' + blockedList);
    }

    lastSendStartedAt = now;

    sendBtn.disabled = true;
    status.textContent = 'Sending...';
    const senderEmail = teacherEmail;
    const senderName = deriveSenderName(teacherName, senderEmail);

    Promise.allSettled(
        eligibleLearners.map(function (learner) {
            return sendEmailViaEmailJS(learner.email, learner.name, location, senderEmail, senderName, description);
        })
    )
        .then(results=>{
            const failed = results
                .map((result, index) => ({result, recipient: eligibleLearners[index] && eligibleLearners[index].email}))
                .filter(entry => entry.result.status === 'rejected');
            const sent = eligibleLearners.length - failed.length;
            const history = getDailySendHistory();
            if (sent > 0) {
                results.forEach(function (result, index) {
                    if (result.status === 'fulfilled') {
                        const recipient = eligibleLearners[index];
                        if (recipient && recipient.email) {
                            history[recipient.email] = todayKey;
                        }
                    }
                });
                setDailySendHistory(history);
            }
            if (failed.length) {
                const failedList = failed.map(f => f.recipient).join(', ');
                status.textContent = 'Sent ' + sent + ' of ' + eligibleLearners.length + '. Failed: ' + failedList;
            } else {
                status.textContent = 'Sent ' + sent + ' reminder email(s).';
            }
            if (blockedByDailyLimit.length) {
                status.textContent += ' Skipped today: ' + blockedByDailyLimit.length + '.';
            }
            alert(status.textContent);
        })
        .catch(err=>{
            status.textContent = 'Send failed: ' + (err && err.message ? err.message : 'Unknown error');
            alert(status.textContent);
        })
        .finally(()=>{
            sendBtn.disabled = false;
        });
});
</script>
