<!DOCTYPE html>
<html>
<head>
    <title>Sender</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a2470">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="Visual_Layout.css">

<style>
body {
   font-family: Helvetica, sans-serif;
   background-color: hsl(236, 68%, 26%);
   margin: 0;
   padding: 0;
   display: none;
}
header {
   background-color: #f1e31ce1;
   color: #fff;
   padding: 20px;
   text-align: center;
}
nav ul {
   list-style-type: none;
   padding: 0;
}
nav ul li {
   display: inline;
   margin-right: 20px;
}
nav ul li a {
   text-decoration: none;
   color: #fff;
}

nav ul li a.active,
nav ul li a.current {
    background-color: #eee;
    color: #000;
    padding: 4px 8px;
    border-radius: 4px;
}
nav ul li a:active {
    background-color: #ccc;
}

#loader {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#loader .spinner {
    border: 4px solid #ccc;
    border-top: 4px solid #333;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {to{transform:rotate(360deg);}}
main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.content {
   flex: 2;
}
.sidebar {
flex: 1;
background-color: #f9f9f9;
padding: 20px;
margin-left: 20px;
max-height: 500px;
overflow-y: auto;
}
section {
    background-color: #fff;
    min-height: 300px;
    padding: 60px 20px 20px;
    width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

.scroll-container {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 20px;
    text-align: left;
}

.selection-part {
    margin-bottom: 20px;
}

.location-part {
    margin: 20px 0;
    text-align: left;
}

.location-part label {
    display: block;
}

.location-part input {
    width: 100%;
    max-width: 400px;
    box-sizing: border-box;
    padding: 5px;
    margin-bottom: 10px;
}

.location-part textarea {
    width: 100%;
    max-width: 400px;
    box-sizing: border-box;
    padding: 5px;
    margin-bottom: 10px;
    min-height: 88px;
    resize: vertical;
}

.button-container {
    margin-top: 20px;
}

#send-btn {
    padding: 10px 20px;
    font-size: 1rem;
}

#send-status {
    margin-top: 10px;
    font-size: 0.95rem;
    text-align: center;
}
footer {
    background-color: #000000;
    color: #fff;
    padding: 10px 20px;
    text-align: center;
}
</style>
</head>

<body>
    <div id="loader"><div class="spinner"></div></div>
    <header>
        <h1>RaiderAid Reminder</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="#"> </a></li>
                <li><a href="signup-login.html">Sign-Up/Login</a></li>
                <li><a href="#"> </a></li>
                <li><a href="learner-list.html">Learner List</a></li>
                <li><a href="#"> </a></li>
                <li><a href="sender.html" class="current">Sender</a></li>
                <li><a href="#" id="logout-link" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="list-section">
            <div class="selection-part">
                <h2>Select Student(s) to Remind:</h2>
                <div class="scroll-container">
                    <ul>
                        <li><label><input type="checkbox"/> Learner A</label></li>
                        <li><label><input type="checkbox"/> Learner B</label></li>
                        <li><label><input type="checkbox"/> Learner C</label></li>
                        <li><label><input type="checkbox"/> Learner D</label></li>
                        <li><label><input type="checkbox"/> Learner E</label></li> 
                    </ul>
                </div>
            </div>
            <div class="location-part">
                <h3 style="text-align:center;">Enter the Location and Email to Send From:</h3>
                <form id="location-form">
                    <label>Location for selected student(s):<br>
                        <input type="text" name="location" placeholder="e.g. Room 101">
                    </label>
                    <label>Teacher email:<br>
                        <input type="email" name="teacher_email" placeholder="teacher@sunnyvaleisd.net">
                    </label>
                    <label>Teacher name (shown to learners):<br>
                        <input type="text" name="teacher_name" placeholder="e.g. Ms. Johnson">
                    </label>
                    <label>Description (optional):<br>
                        <textarea name="description" placeholder="Describe the RaiderAid activity for learners (club, tutorial, etc.)"></textarea>
                    </label>
                </form>
            </div>
            <div class="button-container">
                <button id="send-btn">Send Reminder</button>
                <div id="send-status"></div>
            </div>
        </section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let authInstance;
const EMAILJS_CONFIG = {
    publicKey: "QTD4OCJRyBm4ObJFA",
    serviceId: "service_0nga3ei",
    templateId: "template_l6l82d6"
};
const APP_BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "");
const CONFIRM_LINK_TTL_MS = 1000 * 60 * 60 * 24 * 7;

function isEmailJsConfigured() {
    return EMAILJS_CONFIG.publicKey &&
        EMAILJS_CONFIG.serviceId &&
        EMAILJS_CONFIG.templateId &&
        !EMAILJS_CONFIG.publicKey.includes("YOUR_") &&
        !EMAILJS_CONFIG.serviceId.includes("YOUR_") &&
        !EMAILJS_CONFIG.templateId.includes("YOUR_");
}

function buildConfirmLink(toEmail, learnerName, senderEmail, senderName, location, description) {
    const base = APP_BASE_URL.replace(/\/$/, "");
    const payload = {
        learner_email: toEmail,
        learner_name: learnerName || "",
        sender_email: senderEmail || "raideraid-reminder",
        sender_name: senderName || "Your teacher",
        location: location,
        description: description || "",
        expires_at: Date.now() + CONFIRM_LINK_TTL_MS,
        nonce: (window.crypto && window.crypto.randomUUID)
            ? window.crypto.randomUUID()
            : String(Date.now()) + Math.random().toString(16).slice(2)
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    return base + "/confirm-attendance.html?data=" + encodeURIComponent(encoded);
}

async function sendEmailViaEmailJS(toEmail, learnerName, location, senderEmail, senderName, description) {
    const confirmLink = buildConfirmLink(toEmail, learnerName, senderEmail, senderName, location, description);
    const response = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            service_id: EMAILJS_CONFIG.serviceId,
            template_id: EMAILJS_CONFIG.templateId,
            user_id: EMAILJS_CONFIG.publicKey,
            template_params: {
                to_email: toEmail,
                learner_name: learnerName || "",
                location: location,
                description: description || "",
                sender_email: senderEmail || "raideraid-reminder",
                sender_name: senderName || "Your teacher",
                confirm_link: confirmLink
            }
        })
    });

    if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || ("EmailJS HTTP " + response.status));
    }
}

function populateLearners(){
    const learners = JSON.parse(localStorage.getItem('learners')||'[]');
    const ul = document.querySelector('.scroll-container ul');
    ul.innerHTML = '';
    learners.forEach((l,index)=>{
        const li = document.createElement('li');
        const chk = document.createElement('input');
        chk.type='checkbox';
        chk.value=index;
        const label = document.createElement('label');
        label.appendChild(chk);
        label.append(' ' + l.first + ' ' + l.last + ' ('+l.email+')');
        li.appendChild(label);
        ul.appendChild(li);
    });
}

function deriveSenderName(nameValue, emailValue) {
    const cleanName = (nameValue || "").trim();
    if (cleanName) return cleanName;

    const localPart = String(emailValue || "").split("@")[0].trim();
    if (!localPart) return "Your teacher";

    return localPart
        .replace(/[._-]+/g, " ")
        .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
}

populateLearners();
window.addEventListener('storage', e=>{
    if(e.key==='learners') populateLearners();
});

(function(){
  initRaiderAidFirebase();
  authInstance = firebase.auth();

  authInstance.onAuthStateChanged(async u=>{
    if(!u){
      window.location.replace('signup-login.html');
      return;
    }
    await u.reload();
    if(!u.emailVerified){
      alert('Please verify your email before accessing this page.');
      await authInstance.signOut();
      window.location.replace('signup-login.html');
      return;
    }
    const teacherEmailInput = document.querySelector('#location-form input[name=teacher_email]');
    if (teacherEmailInput && u.email) {
      teacherEmailInput.value = u.email;
    }
    const teacherNameInput = document.querySelector('#location-form input[name=teacher_name]');
    if (teacherNameInput && u.displayName) {
      teacherNameInput.value = u.displayName;
    }
    const logoutLink = document.getElementById('logout-link');
    logoutLink.style.display = 'inline';
    logoutLink.addEventListener('click', async ev=>{
      ev.preventDefault();
      await authInstance.signOut();
      window.location.replace('signup-login.html');
    });
    document.body.style.display = 'block';
  });
})();

(function(){
  const current = location.pathname.split('/').pop();
  document.querySelectorAll('nav ul li a').forEach(a=>{
    const href = a.getAttribute('href');
    if(a.href === location.href || href === current){ a.classList.add('active'); }
    a.addEventListener('click',()=>{
      document.getElementById('loader').style.display='flex';
    });
  });
  window.addEventListener('beforeunload',()=>{
      document.getElementById('loader').style.display='flex';
  });
})();

document.getElementById('send-btn').addEventListener('click', function(){
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('send-status');
    const learners = JSON.parse(localStorage.getItem('learners')||'[]');
    const selectedLearners = Array.from(document.querySelectorAll('.scroll-container input[type=checkbox]:checked'))
        .map(function (cb) {
            const learner = learners[cb.value];
            if (!learner || !learner.email) return null;
            const first = (learner.first || "").trim();
            const last = (learner.last || "").trim();
            const fullName = (first + " " + last).trim();
            return {
                email: String(learner.email).trim(),
                name: fullName || String(learner.email).trim()
            };
        })
        .filter(Boolean);
    const location = document.querySelector('#location-form input[name=location]').value.trim();
    const teacherEmail = document.querySelector('#location-form input[name=teacher_email]').value.trim();
    const teacherName = document.querySelector('#location-form input[name=teacher_name]').value.trim();
    const description = document.querySelector('#location-form textarea[name=description]').value.trim();

    if(!selectedLearners.length){
        status.textContent = '';
        alert('Please select at least one student');
        return;
    }
    if(!location){
        status.textContent = '';
        alert('Please enter a location before sending.');
        return;
    }
    if(!teacherEmail){
        status.textContent = '';
        alert('Please enter the teacher response email.');
        return;
    }
    if(!isEmailJsConfigured()){
        status.textContent = '';
        alert('EmailJS is not configured yet. Update EMAILJS_CONFIG in sender.html.');
        return;
    }

    sendBtn.disabled = true;
    status.textContent = 'Sending...';
    const senderEmail = teacherEmail;
    const senderName = deriveSenderName(teacherName, senderEmail);

    Promise.allSettled(
        selectedLearners.map(function (learner) {
            return sendEmailViaEmailJS(learner.email, learner.name, location, senderEmail, senderName, description);
        })
    )
        .then(results=>{
            const failed = results
                .map((result, index) => ({result, recipient: selectedLearners[index] && selectedLearners[index].email}))
                .filter(entry => entry.result.status === 'rejected');
            const sent = selectedLearners.length - failed.length;
            if (failed.length) {
                const failedList = failed.map(f => f.recipient).join(', ');
                status.textContent = 'Sent ' + sent + ' of ' + selectedLearners.length + '. Failed: ' + failedList;
            } else {
                status.textContent = 'Sent ' + sent + ' reminder email(s).';
            }
            alert(status.textContent);
        })
        .catch(err=>{
            status.textContent = 'Send failed: ' + (err && err.message ? err.message : 'Unknown error');
            alert(status.textContent);
        })
        .finally(()=>{
            sendBtn.disabled = false;
        });
});
</script>
<script src="pwa-register.js"></script>
    </main>
    <footer>
        <p>&copy; 2026 RaiderAid Reminder. All rights reserved.</p>
    </footer>
</body>
</html>
